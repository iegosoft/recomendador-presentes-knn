name: Testes

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Instala dependencias
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Roda os testes
        run: pytest
